<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>NeuroOS</title>
<style>
  :root {
    --ink: #1c2321; --paper: #f2f2ee; --muted: #62726c; --accent: #3f6e64;
    --accent-soft: #dbe6e2; --line: #dbd9d1;
    --low: #3f6e64; --medium: #b98a3d; --high: #b25c4d;
  }
  @media (prefers-color-scheme: dark) {
    :root { --ink: #eae8e3; --paper: #14181a; --muted: #97a19b; --accent: #74ada0;
      --accent-soft: #1e2c28; --line: #2b302e; --low: #74ada0; --medium: #d0a153; --high: #d1786a; }
  }
  * { box-sizing: border-box; }
  body { width: 320px; margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, "Segoe UI", sans-serif; font-size: 13px; }
  header { padding: 14px 16px 10px; border-bottom: 1px solid var(--line); }
  h1 { font-family: Georgia, serif; font-weight: 400; font-size: 1.15rem; margin: 0 0 2px; }
  .sub { color: var(--muted); font-size: 11.5px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--line); }
  .toggle-row span { font-size: 12.5px; }
  label.switch { position: relative; display: inline-block; width: 34px; height: 19px; }
  label.switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--line); border-radius: 999px; cursor: pointer; transition: 0.15s; }
  .slider::before { content: ""; position: absolute; width: 15px; height: 15px; left: 2px; top: 2px;
    background: var(--paper); border-radius: 50%; transition: 0.15s; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(15px); }
  .list { max-height: 260px; overflow-y: auto; }
  .row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center;
    padding: 9px 16px; border-bottom: 1px solid var(--line); }
  .row .when { color: var(--muted); font-size: 11px; }
  .row .stat { font-family: ui-monospace, monospace; font-size: 10.5px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.low { background: var(--low); } .dot.medium { background: var(--medium); } .dot.high { background: var(--high); }
  .empty { padding: 24px 16px; color: var(--muted); font-size: 12px; text-align: center; }
  footer { padding: 8px 16px; color: var(--muted); font-size: 10.5px; border-top: 1px solid var(--line); }
</style>
</head>
<body>
  <header>
    <h1>NeuroOS</h1>
    <div class="sub">Cognitive-load signal, not biometrics.</div>
  </header>
  <div class="toggle-row">
    <span>Interventions</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="list" id="list"></div>
  <footer>Local only — nothing leaves this browser.</footer>
  <script src="popup.js"></script>
</body>
</html>
